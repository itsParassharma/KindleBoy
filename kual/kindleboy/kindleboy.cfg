# kindleboy preferences (key=value). The app rewrites this file, so comments you
# add may be lost. Edit values, one per line.

# 0 = FAST mode (A2 waveform, dithered, ~8 fps). 1 = QUALITY (GL16 4-gray, slower).
quality_mode=0

# Seconds between automatic battery-save flushes during play.
autosave_sec=60

# Seconds between full-screen cleanup flashes during play (0 = never).
deghost_sec=60

# Auto-open the pause menu after this many idle seconds, to save power (0 = off).
idle_pause_sec=300

# 1 = when you open a game, resume from its save state; 0 = always start fresh.
resume=1

# Game sound. 0 = off (default; saves CPU/battery). 1 = on. The Kindle has no
# speaker, so sound only comes out over paired Bluetooth headphones/speaker, and
# only with the framework running (i.e. not in "max performance" mode). You can
# also flip this from the pause menu (SOUND: ON/OFF).
audio=0

# The command raw PCM is piped into on the Kindle. Change it if your device uses
# a different audio player than aplay. Format is 32768 Hz, 16-bit LE, stereo.
audio_cmd=aplay -q -f S16_LE -r 32768 -c 2 -

# 0 = pick the largest integer scale automatically. Set e.g. 3 to force it.
scale_override=0

# Directory the in-app browser scans for .gb / .gbc files.
rom_dir=/mnt/us/roms/gb

# Filled in automatically with the last ROM you played.
last_rom=
