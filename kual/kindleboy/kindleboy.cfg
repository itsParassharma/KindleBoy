# kindleboy preferences (key=value). The app rewrites this file, so comments you
# add may be lost. Edit values, one per line.

# 0 = FAST mode (A2 waveform, dithered, ~8 fps). 1 = QUALITY (GL16 4-gray, slower).
quality_mode=0

# Seconds between automatic battery-save flushes during play.
autosave_sec=60

# 0 = pick the largest integer scale automatically. Set e.g. 3 to force it.
scale_override=0

# Directory the in-app browser scans for .gb / .gbc files.
rom_dir=/mnt/us/roms/gb

# Filled in automatically with the last ROM you played.
last_rom=
